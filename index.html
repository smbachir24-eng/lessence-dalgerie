<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Essence d'Algérie | Premium Perfumes</title>
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #fcfcfc;
      }
      #root:empty::after {
        content: "";
        width: 32px;
        height: 32px;
        border: 4px solid #000;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
